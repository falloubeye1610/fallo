# Configuration de l'application RestouTickets
spring.application.name=RestouTickets

# Port du serveur (par défaut 8080)
server.port=8080

# Configuration de l'application

# Configuration de la base de données H2 (en mémoire)
spring.datasource.url=jdbc:h2:file:./data/restoudb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuration de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Import des configurations sensibles (JWT, etc.) qui sont ignorées par Git
spring.config.import=optional:classpath:application-secret.properties
