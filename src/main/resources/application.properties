# Configuration de l'application RestouTickets
spring.application.name=RestouTickets

# Port du serveur (par défaut 8080)
server.port=8080

# Configuration de l'application

# Configuration de la base de données H2 (en mémoire)
spring.datasource.url=jdbc:h2:file:./data/restoudb
spring.datasource.username=sa
spring.datasource.password=

# Configuration de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true